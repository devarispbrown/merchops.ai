apiVersion: v1
kind: Service
metadata:
  name: merchops-web
  namespace: merchops
  labels:
    app: merchops
    component: web
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: merchops
    component: web
  sessionAffinity: None
