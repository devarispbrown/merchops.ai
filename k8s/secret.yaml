# Create secrets with:
# kubectl create secret generic merchops-secrets \
#   --from-literal=database-url=postgresql://user:pass@host:5432/db \
#   --from-literal=redis-url=redis://host:6379/0 \
#   --from-literal=nextauth-secret=your-secret \
#   --from-literal=encryption-key=your-key \
#   --from-literal=shopify-client-id=your-id \
#   --from-literal=shopify-client-secret=your-secret \
#   --from-literal=shopify-webhook-secret=your-webhook-secret \
#   --from-literal=anthropic-api-key=your-key \
#   -n merchops

apiVersion: v1
kind: Secret
metadata:
  name: merchops-secrets
  namespace: merchops
type: Opaque
# data:
#   Add base64 encoded secrets here or use kubectl create secret
