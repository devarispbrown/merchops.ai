# MerchOps Local Development Services
# Uses non-obvious ports to avoid conflicts with other projects
#
# Versions (latest stable as of 2025):
#   - PostgreSQL: 17-alpine
#   - Redis: 7.4-alpine
#
# Ports:
#   - PostgreSQL: 5847 (instead of 5432)
#   - Redis: 6847 (instead of 6379)
#
# Start: pnpm services:start
# Stop: pnpm services:stop

version: '3.9'

services:
  postgres:
    image: postgres:17-alpine
    container_name: merchops_dev_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: merchops
      POSTGRES_PASSWORD: merchops_dev_password
      POSTGRES_DB: merchops_dev
      # Performance tuning for development
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    ports:
      - '5847:5432'
    volumes:
      - merchops_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U merchops -d merchops_dev']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    # Optimize for development workloads
    command:
      - 'postgres'
      - '-c'
      - 'max_connections=100'
      - '-c'
      - 'shared_buffers=128MB'
      - '-c'
      - 'log_statement=all'
      - '-c'
      - 'log_duration=on'

  redis:
    image: redis:7.4-alpine
    container_name: merchops_dev_redis
    restart: unless-stopped
    ports:
      - '6847:6379'
    volumes:
      - merchops_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    # Enable AOF persistence for development
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  merchops_postgres_data:
    driver: local
    name: merchops_dev_postgres_data
  merchops_redis_data:
    driver: local
    name: merchops_dev_redis_data

networks:
  default:
    name: merchops_dev_network
