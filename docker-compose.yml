version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: merchops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: merchops
      POSTGRES_PASSWORD: merchops_dev_password
      POSTGRES_DB: merchops_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U merchops']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: merchops_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Prisma Studio (optional, for development)
  # Uncomment to use
  # prisma-studio:
  #   image: node:20-alpine
  #   container_name: merchops_prisma_studio
  #   working_dir: /app
  #   volumes:
  #     - ./:/app
  #   command: npx prisma studio
  #   ports:
  #     - '5555:5555'
  #   depends_on:
  #     - postgres
  #   environment:
  #     DATABASE_URL: postgresql://merchops:merchops_dev_password@postgres:5432/merchops_dev

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: merchops_network
