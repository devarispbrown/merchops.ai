# ============================================================================
# MerchOps Beta MVP - Production Docker Compose
# Full production stack with web app, PostgreSQL, and Redis
# ============================================================================

version: '3.8'

services:
  # ============================================================================
  # Web Application - MerchOps Next.js App
  # ============================================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    image: merchops/web:latest
    container_name: merchops-web
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Node environment
      NODE_ENV: production
      PORT: 3000

      # Database connection
      DATABASE_URL: postgresql://${POSTGRES_USER:-merchops}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-merchops_production}?schema=public&connection_limit=10&pool_timeout=20

      # Redis connection
      REDIS_URL: redis://redis:6379/0

      # NextAuth
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}

      # Shopify OAuth
      SHOPIFY_CLIENT_ID: ${SHOPIFY_CLIENT_ID}
      SHOPIFY_CLIENT_SECRET: ${SHOPIFY_CLIENT_SECRET}
      SHOPIFY_SCOPES: ${SHOPIFY_SCOPES:-read_products,write_products,read_orders,read_customers,read_inventory,write_inventory,write_discounts,read_price_rules,write_price_rules}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_WEBHOOK_SECRET}

      # Email provider
      EMAIL_PROVIDER_API_KEY: ${EMAIL_PROVIDER_API_KEY}

      # AI Provider
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      AI_MODEL_TIER: ${AI_MODEL_TIER:-balanced}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-2000}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.7}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # Encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

      # Observability
      SENTRY_DSN: ${SENTRY_DSN}
      LOG_LEVEL: ${LOG_LEVEL:-info}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - merchops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================================
  # Worker - BullMQ Background Jobs
  # ============================================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: merchops/web:latest
    container_name: merchops-worker
    restart: unless-stopped
    command: ["node", "-r", "tsx/register", "apps/web/src/server/jobs/worker.ts"]
    environment:
      # Node environment
      NODE_ENV: production

      # Database connection
      DATABASE_URL: postgresql://${POSTGRES_USER:-merchops}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-merchops_production}?schema=public&connection_limit=5&pool_timeout=20

      # Redis connection
      REDIS_URL: redis://redis:6379/0

      # Shopify
      SHOPIFY_CLIENT_ID: ${SHOPIFY_CLIENT_ID}
      SHOPIFY_CLIENT_SECRET: ${SHOPIFY_CLIENT_SECRET}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_WEBHOOK_SECRET}

      # Email provider
      EMAIL_PROVIDER_API_KEY: ${EMAIL_PROVIDER_API_KEY}

      # AI Provider
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      AI_MODEL_TIER: ${AI_MODEL_TIER:-balanced}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-2000}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.7}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # Encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

      # Observability
      SENTRY_DSN: ${SENTRY_DSN}
      LOG_LEVEL: ${LOG_LEVEL:-info}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - merchops-network

  # ============================================================================
  # PostgreSQL - Primary Database
  # ============================================================================
  postgres:
    image: postgres:17-alpine
    container_name: merchops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-merchops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-merchops_production}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./prisma/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - merchops-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-merchops} -d ${POSTGRES_DB:-merchops_production}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=2621kB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"

  # ============================================================================
  # Redis - Job Queue and Caching
  # ============================================================================
  redis:
    image: redis:7.4-alpine
    container_name: merchops-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - merchops-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ============================================================================
# Networks
# ============================================================================
networks:
  merchops-network:
    driver: bridge
    name: merchops-network

# ============================================================================
# Volumes - Persistent Storage
# ============================================================================
volumes:
  postgres-data:
    name: merchops-postgres-data
    driver: local
  redis-data:
    name: merchops-redis-data
    driver: local
