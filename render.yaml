# Render Blueprint for MerchOps Beta MVP
# Defines all infrastructure needed for production deployment
# Docs: https://render.com/docs/blueprint-spec

services:
  # Main Next.js Application
  - type: web
    name: merchops-web
    runtime: node
    plan: starter
    region: oregon
    buildCommand: pnpm install && pnpm prisma:generate && pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/health
    branch: main
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        fromDatabase:
          name: merchops-db
          property: connectionString

      - key: REDIS_URL
        fromService:
          type: redis
          name: merchops-redis
          property: connectionString

      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true

      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: SHOPIFY_SCOPES
        value: read_products,write_products,read_orders,read_customers,read_inventory,write_inventory,write_discounts,read_price_rules,write_price_rules
      - key: SHOPIFY_WEBHOOK_SECRET
        generateValue: true

      - key: ENCRYPTION_KEY
        generateValue: true

      - key: SENTRY_DSN
        sync: false

      - key: EMAIL_PROVIDER_API_KEY
        sync: false

      - key: AI_PROVIDER
        value: anthropic
      - key: AI_MODEL_TIER
        value: balanced
      - key: AI_MAX_TOKENS
        value: 2000
      - key: AI_TEMPERATURE
        value: 0.7

      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false

      - key: LOG_LEVEL
        value: info

  # Background Job Worker
  - type: worker
    name: merchops-worker
    runtime: node
    plan: starter
    region: oregon
    buildCommand: pnpm install && pnpm prisma:generate
    startCommand: pnpm workers
    branch: main
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        fromDatabase:
          name: merchops-db
          property: connectionString

      - key: REDIS_URL
        fromService:
          type: redis
          name: merchops-redis
          property: connectionString

      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: SHOPIFY_SCOPES
        value: read_products,write_products,read_orders,read_customers,read_inventory,write_inventory,write_discounts,read_price_rules,write_price_rules

      - key: ENCRYPTION_KEY
        sync: false

      - key: SENTRY_DSN
        sync: false
      - key: EMAIL_PROVIDER_API_KEY
        sync: false

      - key: AI_PROVIDER
        value: anthropic
      - key: AI_MODEL_TIER
        value: balanced
      - key: ANTHROPIC_API_KEY
        sync: false

      - key: LOG_LEVEL
        value: info

  # Redis for queues and caching
  - type: redis
    name: merchops-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  # PostgreSQL Database
  - name: merchops-db
    databaseName: merchops
    plan: starter
    region: oregon
    postgresMajorVersion: 16
    ipAllowList: []
